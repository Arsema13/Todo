<div class="form-page">
  <div class="form-card">
    <h2>Create Todo</h2>
    <p class="form-subtitle">Add a new task to your list</p>

    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="todoForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Title *</label>
        <input
          id="title"
          type="text"
          formControlName="title"
          class="form-control"
          [class.is-invalid]="title?.invalid && title?.touched"
          placeholder="What needs to be done?"
        />
        <div class="invalid-feedback" *ngIf="title?.invalid && title?.touched">
          <span *ngIf="title?.errors?.['required']">Title is required</span>
          <span *ngIf="title?.errors?.['minlength']">Minimum 3 characters</span>
          <span *ngIf="title?.errors?.['maxlength']">Maximum 200 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          formControlName="description"
          class="form-control"
          rows="4"
          placeholder="Optional description..."
        ></textarea>
        <div class="invalid-feedback" *ngIf="description?.invalid && description?.touched">
          <span *ngIf="description?.errors?.['maxlength']">Maximum 1000 characters</span>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" routerLink="/todos">Cancel</button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="todoForm.invalid || loading"
        >
          {{ loading ? 'Creating...' : 'Create Todo' }}
        </button>
      </div>
    </form>
  </div>
</div>
