<div class="dialog-overlay">
  <div class="dialog-box">
    <h3>Confirm</h3>
    <p>{{ message }}</p>
    <div class="dialog-actions">
      <button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      <button class="btn btn-danger" (click)="onConfirm()">Confirm</button>
    </div>
  </div>
</div>
